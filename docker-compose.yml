services:
  mongo:
    image: mongo:8.2
    container_name: royal-bellion-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: royal_bellion
      MONGO_INITDB_ROOT_PASSWORD: royal_bellion
      MONGO_INITDB_DATABASE: royal_bellion
    volumes:
      - royal-bellion-mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--username",
          "royal_bellion",
          "--password",
          "royal_bellion",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand('ping').ok",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  royal-bellion-mongo-data:
